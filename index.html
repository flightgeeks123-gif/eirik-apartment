<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days since Eirik moved in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f7f6f2;
      font-family: 'DM Sans', sans-serif;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      position: relative;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      background: #eceae3;
      z-index: 0;
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    .number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(90px, 22vw, 160px);
      font-weight: 700;
      line-height: 1;
      color: #2c2c2a;
      letter-spacing: -4px;
      position: relative;
      z-index: 1;
    }

    .word {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888780;
      margin-top: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #b4b2a9;
      margin: 1.75rem auto;
      position: relative;
      z-index: 1;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 400;
      color: #2c2c2a;
      max-width: 380px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }

    .since {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #b4b2a9;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
    }

    .ticker {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 1.75rem;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #b4b2a9;
      animation: pulse-dot 2.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #1a1a18; }
      .bg-circle { background: #2c2c2a; }
      .number, .title { color: #f1efe8; }
      .label, .word { color: #888780; }
      .divider { background: #5f5e5a; }
      .since { color: #5f5e5a; }
      .dot { background: #5f5e5a; }
    }
  </style>
</head>
<body>

  <div class="bg-circle" style="width:600px;height:600px;top:-200px;right:-220px;opacity:0.7;"></div>
  <div class="bg-circle" style="width:350px;height:350px;bottom:-120px;left:-100px;opacity:0.5;"></div>

  <div class="container">
    <p class="label">days since</p>
    <p class="number" id="dayCount">0</p>
    <p class="word">days</p>
    <div class="divider"></div>
    <p class="title">Eirik moved into<br>the apartment</p>
    <p class="since" id="sinceDate"></p>
    <div class="ticker">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    const moveInDate = new Date('2026-02-01T00:00:00');
    const now = new Date();
    const days = Math.floor((now - moveInDate) / (1000 * 60 * 60 * 24));
    document.getElementById('dayCount').textContent = days;
    document.getElementById('sinceDate').textContent = 'Since 1 February 2026';
  </script>

</body>
</html>
